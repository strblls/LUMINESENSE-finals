<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LumineSense — Login</title>
  <meta name="description" content="LumineSense smart lighting — intuitive controls, energy savings, and beautiful dashboards." />
  <style>
    :root{
      --bg-a:#fff0f8; --bg-b:#f0e7ff; --accent:#9b6bff; --muted:#7a6b8f; --card:#ffffff; --shadow:0 12px 30px rgba(99,59,141,0.12);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--bg-a),var(--bg-b));color:#1b0f2c;-webkit-font-smoothing:antialiased}
    .app{display:flex;min-height:100vh}

    /* Sidebar */
    .sidebar{width:88px;padding:20px 12px;background:transparent;display:flex;flex-direction:column;align-items:center;gap:18px}
    .logo{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff7bd6);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;box-shadow:0 8px 24px rgba(155,107,255,0.18)}
    .nav-btn{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,0.9),rgba(255,255,255,0.8));box-shadow:var(--shadow);border:none;cursor:pointer}
    .nav-btn svg{width:20px;height:20px;fill:#7f5fa6}

    /* Main content */
    .main{flex:1;padding:32px}
    header{display:flex;align-items:center;justify-content:space-between}
    header h1{margin:0;font-size:28px}
    header .sub{color:var(--muted);font-size:13px}

    .layout{display:grid;grid-template-columns:1fr 420px;gap:22px;margin-top:22px}

    .main{flex:1;padding:32px;display:flex;align-items:center;justify-content:center}
    .layout{display:grid;grid-template-columns:1fr 420px;gap:22px;margin-top:22px}
    .login-card{width:520px;background:linear-gradient(180deg,#fff,#fff);border-radius:16px;padding:28px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
    .roles{display:flex;gap:12px;margin-top:8px}
    .role-btn{flex:1;padding:12px;border-radius:12px;border:2px solid transparent;background:#faf5ff;color:#4a2b63;font-weight:700;cursor:pointer}
    .role-btn.active{background:linear-gradient(90deg,var(--accent),#ff7bd6);color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(155,107,255,0.14)}
    .form-row{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .input{padding:12px;border-radius:10px;border:1px solid #eee;font-size:14px}
    .actions{display:flex;gap:10px;margin-top:12px}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#ff7bd6);border:none;color:white;padding:12px 16px;border-radius:12px;font-weight:700;cursor:pointer}
    .btn-ghost{background:transparent;border:2px solid rgba(120,90,170,0.08);padding:10px 14px;border-radius:12px;color:var(--muted);cursor:pointer}
    footer{margin-top:28px;color:var(--muted);font-size:13px;text-align:center}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar{display:none}.login-card{width:100%}}
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="login-card" role="region" aria-label="LumineSense login">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:18px;font-weight:800">Welcome to LumineSense</div>
            <div style="color:var(--muted);font-size:13px">Sign in to continue as Admin or Faculty</div>
          </div>
          <div>
            <img src="logo.png" alt="LumineSense logo" class="site-logo" onerror="this.style.display='none'">
          </div>
        </div>

        <div class="roles" role="tablist" aria-label="Choose role">
          <button id="role-admin" class="role-btn" type="button" data-role="admin">Admin</button>
          <button id="role-faculty" class="role-btn" type="button" data-role="faculty">Faculty</button>
        </div>

        <form id="loginForm" class="form-row" onsubmit="return handleLogin(event)">
          <input id="roleInput" type="hidden" name="role" value="">
          <label>Email
            <input id="email" class="input" type="email" name="email" placeholder="you@school.edu" required>
          </label>
          <label>Password
            <input id="password" class="input" type="password" name="password" placeholder="••••••••" required>
          </label>

          <div class="actions">
            <button class="btn-primary" type="submit">Sign In</button>
            <button type="button" class="btn-ghost" onclick="clearForm()">Clear</button>
          </div>

          <div id="error" style="color:#a52a2a;font-weight:700;display:none;margin-top:8px"></div>
        </form>

        <div style="margin-top:10px;color:var(--muted);font-size:13px">If you don't have an account, contact your administrator.</div>
        <footer style="margin-top:8px">© <span id="year"></span> LumineSense</footer>
      </div>
    </main>
          </div>
          <div class="card">
            <div style="font-weight:700">Company</div>
            <div style="color:var(--muted);margin-top:8px">About · Careers · Privacy</div>
          </div>
        </aside>
      </div>

      <footer>© <span id="year"></span> LumineSense — Designed for wellbeing</footer>
    </main>
  </div>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
