<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Bootstrap and JS CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!--CSS files-->
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/containers.css">
</head>

<body class="contrast-bg">
    <div class="parent-container">
        <div class="topbar">
            <div class="page-title">
                <button type="button" id="sidebarTrigger">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="bold">Profile Settings</h1> <!--ALERT: PHP | DISPLAY-->
            </div>
            <button class="light info-action-btn logout-btn" onclick="window.location.href='../../index.html'">Logout</button>
        </div>
        <div class="child-container homepage-modal">
            <div class="profile-wrapper">
                <div class="profile-main-card">
                    <div class="profile-header">
                        <div class="profile-avatar avatar-icon">JD</div>
                        <div class="profile-user">
                            <h2 class="bold mb-1">John Doe</h2>
                            <p class="light mb-0">Faculty Member</p>
                        </div>
                    </div>
                    <div class="profile-content row gx-4 gy-4">
                        <div class="col-xl-5 col-lg-6">
                            <div class="info-card">
                                <div class="info-card-header d-flex align-items-start justify-content-between">
                                    <h3 class="bold mb-0">Contact Information</h3>
                                    <button class="light info-action-btn">Request Edit</button>
                                </div>
                                <div class="info-field">
                                    <span class="label">Email</span>
                                    <div class="field-value">john.doe@faculty.uno-r.edu</div>
                                </div>
                                <div class="info-field">
                                    <span class="label">Department</span>
                                    <div class="field-value">N/A</div>
                                </div>
                                <div class="info-field">
                                    <span class="label">Address</span>
                                    <div class="field-value">N/A</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-7 col-lg-6">
                            <div class="info-card schedule-card">
                                <div class="info-card-header d-flex align-items-start justify-content-between">
                                    <h3 class="bold mb-0">Schedule</h3>
                                    <button class="light info-action-btn">See Details</button>
                                </div>
                                <div class="schedule-list mt-4">
                                    <div class="schedule-item">
                                        <div>
                                            <p class="subject mb-1">Grade 6 — Narra</p>
                                            <p class="light mb-0">9:00 - 10:00 A.M.</p>
                                        </div>
                                    </div>
                                    <div class="schedule-item">
                                        <div>
                                            <p class="subject mb-1">Grade 7 — Manga</p>
                                            <p class="light mb-0">10:30 - 12:00 P.M.</p>
                                        </div>
                                    </div>
                                    <div class="schedule-item">
                                        <div>
                                            <p class="subject mb-1">Grade 10 — Mangosteen</p>
                                            <p class="light mb-0">1:00 - 3:00 P.M.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas"
                aria-labelledby="sidebarOffcanvasLabel">
                <div class="offcanvas-header justify-content-center">
                    <img src="../../images/logo.png" class="logo" onclick="dissolve('../../index.html')">
                </div>
                <div class="offcanvas-body align-items-center d-flex flex-column">
                    <button class="wb-2"><i class="bi bi-lightbulb"></i></button>
                    <button class="wb-2"><i class="bi bi-broadcast"></i></button>
                    <button class="wb-2"><i class="bi bi-hand-thumbs-up"></i></button>
                    <button class="wb-2"><i class="bi bi-calendar-event"></i></button>
                    <button class="wb-2"><i class="bi bi-gear"></i></button>
                </div>
                <div class="offcanvas-footer">
                    <img src="../../images/team-logo.png" class="logo">
            </div>
        </div>

        <script src="../../script/animations.js"></script>
        <script src="../../script/toggles.js"></script>
    </div>
</body>

</html>
